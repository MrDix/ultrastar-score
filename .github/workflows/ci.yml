name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install C++ build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install dependencies and build C++ extension
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify C++ extension loaded
        run: python -c "from ultrastar_score.pitch._ptakf import PtAKF; print('ptAKF C++ extension OK')"

      - name: Run tests
        run: pytest -v --tb=short
